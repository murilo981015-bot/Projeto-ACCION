<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="CSS/cliente.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1><i class="fas fa-users"></i> Cadastro de Cliente</h1>
                <p>Gerencie seus clientes de forma simples</p>
            </div>

            <div class="card-body">
                <!-- Formulário de Cadastro -->
                <div class="form-area">
                    <h2><i class="fas fa-user-plus"></i> Dados do Cliente</h2>
                    <form id="formCliente">
                        <!-- Código gerado automaticamente -->
                        <div class="form-row">
                            <div class="form-group">
                                <label><i class="fas fa-barcode"></i> Código</label>
                                <input type="text" id="codigo" class="form-control" readonly placeholder="Gerado automaticamente" style="background:#f5f5f5;">
                            </div>
                        </div>

                        <!-- Tipo de Cliente -->
                        <div class="form-row">
                            <div class="form-group">
                                <label><i class="fas fa-user-tag"></i> Tipo de Cliente *</label>
                                <select id="tipoCliente" class="form-control" required>
                                    <option value="">Selecione o tipo</option>
                                    <option value="PF">Pessoa Física (PF)</option>
                                    <option value="PJ">Pessoa Jurídica (PJ)</option>
                                </select>
                            </div>
                        </div>

                        <!-- CPF/CNPJ -->
                        <div class="form-row">
                            <div class="form-group">
                                <label id="labelDocumento"><i class="fas fa-id-card"></i> CPF *</label>
                                <input type="text" id="documento" class="form-control" placeholder="Digite o CPF ou CNPJ" required>
                            </div>
                        </div>

                        <!-- Nome do Cliente -->
                        <div class="form-row">
                            <div class="form-group">
                                <label id="labelNome"><i class="fas fa-user"></i> Nome do Cliente *</label>
                                <input type="text" id="nome" class="form-control" placeholder="Digite o nome completo" required>
                            </div>
                        </div>

                        <input type="hidden" id="clienteId">

                        <div class="btn-group">
                            <button type="button" class="btn btn-secondary" onclick="limparFormulario()">
                                <i class="fas fa-eraser"></i> Limpar
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Salvar
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Lista de Clientes -->
                <div class="table-area">
                    <h2><i class="fas fa-list"></i> Lista de Clientes</h2>
                    <div class="search-box">
                        <input type="text" id="busca" placeholder="🔍 Buscar cliente por nome, CPF/CNPJ ou código..." onkeyup="buscarClientes()">
                    </div>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Tipo</th>
                                    <th>CPF/CNPJ</th>
                                    <th>Nome do Cliente</th>
                                    <th width="100">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="listaClientes">
                                <tr><td colspan="5" style="text-align: center;">Nenhum cliente cadastrado</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Confirmar exclusão</h3>
            </div>
            <div class="modal-body">
                <p>Tem certeza que deseja excluir este cliente?</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-danger" id="confirmarExcluir">Excluir</button>
            </div>
        </div>
    </div>

    <!-- Mensagem -->
    <div id="mensagem" class="mensagem"></div>

    <script src="script.js"></script>
</body>
</html>
